# Connected mode configuration for printer interface

# Printer configuration
printer:
  serial_device: "/dev/ttyUSB0"
  baud_rate: 115200
  # If your printer has Y and Z axes physically swapped (Y button moves Z motor, etc.),
  # set this to true to swap them in G-code commands
  swap_yz_axes: false  # Standard Kobra 2 Neo axis layout (Y=bed, Z=gantry)
  # Physical machine dimensions (actual hardware measurements, used for visualization)
  physical:
    bed_width: 230      # mm (X) - full PEI plate
    bed_depth: 230      # mm (Y) - full PEI plate
    frame_width: 350    # mm - X span between uprights
    frame_depth: 300    # mm - Y depth of base
    frame_height: 400   # mm - upright height
    gantry_width: 300   # mm - X-gantry bar length

  # Software-enforced safe movement limits (nozzle will not move outside these)
  safe_limits:
    x_min: 5.0   # mm - margin from left edge
    x_max: 215.0 # mm - margin from right edge
    y_min: 5.0   # mm - margin from front edge
    y_max: 215.0 # mm - margin from back edge
    z_min: 0.0   # mm - bed level
    z_max: 245.0 # mm - below top of frame
  move_feedrate_default: 1500  # mm/min

# Camera configuration
# For Arducam C-mount LN046 manual focus lens with Raspberry Pi HQ Camera
# Focus is adjusted by physically rotating the focus ring on the lens itself.
camera:
  sharpness: 2.0  # Sharpness level (0.0-16.0, default 1.0)
  jpeg_quality: 85  # JPEG compression quality (1-100, default 75)

# Streaming
# Higher resolution for better quality (HQ Camera supports up to 4056x3040)
stream:
  preview_width: 1920  # px (increased for better quality)
  preview_height: 1080  # px (increased for better quality)
  preview_fps: 15  # fps (reduced slightly for higher resolution)

